<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OptiMax v8.0 - Professional Edition</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
        }

        .header {
            background: white;
            padding: 30px;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
            margin-bottom: 30px;
            text-align: center;
        }

        .header h1 {
            color: #667eea;
            font-size: 2.5em;
            margin-bottom: 10px;
        }

        .header .version {
            color: #10b981;
            font-weight: bold;
            font-size: 1.1em;
            margin-bottom: 10px;
        }

        .header p {
            color: #666;
            font-size: 1.1em;
        }

        .search-box {
            background: white;
            padding: 20px;
            border-radius: 15px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
            margin-bottom: 20px;
        }

        .search-input-group {
            display: flex;
            gap: 10px;
        }

        .search-input {
            flex: 1;
            padding: 15px;
            border: 2px solid #e5e7eb;
            border-radius: 10px;
            font-size: 1.1em;
            text-align: right;
        }

        .search-input:focus {
            outline: none;
            border-color: #667eea;
        }

        .search-btn {
            padding: 15px 30px;
            background: #667eea;
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 1.1em;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s;
        }

        .search-btn:hover {
            background: #5568d3;
        }

        .search-btn:disabled {
            background: #9ca3af;
            cursor: not-allowed;
        }

        .tabs {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
        }

        .tab {
            flex: 1;
            padding: 15px;
            background: white;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            font-size: 1.1em;
            font-weight: bold;
            transition: all 0.3s;
        }

        .tab.active {
            background: #667eea;
            color: white;
        }

        .tab-content {
            display: none;
        }

        .tab-content.active {
            display: block;
        }

        .stock-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 20px;
            margin-top: 20px;
        }

        .stock-card {
            background: white;
            padding: 20px;
            border-radius: 15px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
            cursor: pointer;
            transition: transform 0.3s, box-shadow 0.3s;
            position: relative;
        }

        .stock-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 10px 25px rgba(0,0,0,0.2);
        }

        .stock-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
        }

        .stock-symbol {
            font-size: 1.5em;
            font-weight: bold;
            color: #667eea;
        }

        .stock-price {
            font-size: 1.3em;
            font-weight: bold;
            color: #333;
        }

        .stock-change {
            margin: 10px 0;
            font-size: 1.1em;
        }

        .positive {
            color: #10b981;
        }

        .negative {
            color: #ef4444;
        }

        .score-badge {
            display: inline-block;
            padding: 8px 15px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border-radius: 20px;
            font-weight: bold;
            margin: 10px 0;
        }

        .signal-badge {
            display: inline-block;
            padding: 5px 10px;
            border-radius: 5px;
            font-size: 0.9em;
            font-weight: bold;
        }

        .signal-إشارة-قوية-جداً {
            background: #10b981;
            color: white;
        }

        .signal-إشارة-قوية {
            background: #34d399;
            color: white;
        }

        .signal-إشارة-إيجابية {
            background: #6ee7b7;
            color: #065f46;
        }

        .signal-إشارة-محايدة {
            background: #fbbf24;
            color: #78350f;
        }

        .signal-إشارة-سلبية {
            background: #ef4444;
            color: white;
        }

        .loading {
            text-align: center;
            padding: 50px;
            font-size: 1.5em;
            color: white;
        }

        .error {
            background: #fee2e2;
            color: #991b1b;
            padding: 20px;
            border-radius: 10px;
            margin: 20px 0;
        }

        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.7);
            z-index: 1000;
            overflow-y: auto;
        }

        .modal.active {
            display: flex;
            align-items: flex-start;
            justify-content: center;
            padding: 20px;
        }

        .modal-content {
            background: white;
            padding: 30px;
            border-radius: 20px;
            max-width: 1200px;
            width: 100%;
            max-height: 90vh;
            overflow-y: auto;
            position: relative;
            margin: 20px 0;
        }

        .close-modal {
            position: sticky;
            top: 10px;
            left: 10px;
            font-size: 2em;
            cursor: pointer;
            background: #ef4444;
            color: white;
            border: none;
            width: 40px;
            height: 40px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 10;
            box-shadow: 0 2px 8px rgba(0,0,0,0.2);
        }

        .close-modal:hover {
            background: #dc2626;
        }

        .detail-section {
            margin: 20px 0;
            padding: 20px;
            background: #f9fafb;
            border-radius: 10px;
        }

        .detail-section.stage-1 {
            border: 3px solid #667eea;
            background: linear-gradient(135deg, #f0f4ff 0%, #e8edff 100%);
        }

        .detail-section.stage-2 {
            border: 3px solid #10b981;
            background: linear-gradient(135deg, #ecfdf5 0%, #d1fae5 100%);
        }

        .detail-section h3 {
            color: #667eea;
            margin-bottom: 15px;
            font-size: 1.4em;
        }

        .detail-section.stage-2 h3 {
            color: #10b981;
        }

        .signals-table {
            width: 100%;
            border-collapse: collapse;
            margin: 20px 0;
            background: white;
            border-radius: 10px;
            overflow: hidden;
        }

        .signals-table th {
            background: #667eea;
            color: white;
            padding: 12px;
            text-align: right;
            font-weight: bold;
        }

        .signals-table td {
            padding: 12px;
            border-bottom: 1px solid #e5e7eb;
            text-align: right;
        }

        .signals-table tr:hover {
            background: #f9fafb;
        }

        .summary-box {
            background: white;
            padding: 20px;
            border-radius: 10px;
            margin: 15px 0;
            border-left: 5px solid #667eea;
        }

        .claude-indicator-box {
            background: white;
            padding: 15px;
            margin: 10px 0;
            border-radius: 8px;
            border-right: 4px solid #10b981;
        }

        .claude-indicator-box h4 {
            color: #10b981;
            margin-bottom: 10px;
        }

        .claude-indicator-box p {
            line-height: 1.8;
            color: #333;
            margin: 5px 0;
        }

        .detail-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 15px;
        }

        .detail-item {
            padding: 10px;
            background: white;
            border-radius: 8px;
        }

        .detail-item strong {
            color: #666;
            display: block;
            margin-bottom: 5px;
        }

        .warning-box {
            background: #fef3c7;
            border-left: 4px solid #f59e0b;
            padding: 15px;
            margin: 15px 0;
            border-radius: 5px;
        }

        .info-box {
            background: #dbeafe;
            border-left: 4px solid #3b82f6;
            padding: 15px;
            margin: 15px 0;
            border-radius: 5px;
        }

        .success-box {
            background: #d1fae5;
            border-left: 4px solid #10b981;
            padding: 15px;
            margin: 15px 0;
            border-radius: 5px;
        }

        .no-data {
            text-align: center;
            padding: 50px;
            color: #666;
            font-size: 1.2em;
        }

        .stage-badge {
            display: inline-block;
            padding: 8px 16px;
            border-radius: 20px;
            font-weight: bold;
            margin-bottom: 15px;
            font-size: 1.1em;
        }

        .stage-1-badge {
            background: #667eea;
            color: white;
        }

        .stage-2-badge {
            background: #10b981;
            color: white;
        }

        .final-decision-box {
            background: linear-gradient(135deg, #10b981 0%, #059669 100%);
            color: white;
            padding: 25px;
            border-radius: 15px;
            margin: 20px 0;
            box-shadow: 0 10px 25px rgba(16, 185, 129, 0.3);
        }

        .final-decision-box h4 {
            font-size: 1.5em;
            margin-bottom: 15px;
        }

        .final-decision-box.negative {
            background: linear-gradient(135deg, #ef4444 0%, #dc2626 100%);
            box-shadow: 0 10px 25px rgba(239, 68, 68, 0.3);
        }

        .final-decision-box.neutral {
            background: linear-gradient(135deg, #f59e0b 0%, #d97706 100%);
            box-shadow: 0 10px 25px rgba(245, 158, 11, 0.3);
        }

        @media (max-width: 768px) {
            .header h1 {
                font-size: 1.8em;
            }

            .stock-grid {
                grid-template-columns: 1fr;
            }

            .modal-content {
                padding: 20px;
            }

            .detail-grid {
                grid-template-columns: 1fr;
            }

            .search-input-group {
                flex-direction: column;
            }

            .signals-table {
                font-size: 0.9em;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>📈 OptiMax</h1>
            <div class="version">v8.0.0 - Professional Edition</div>
            <p>تحليل ذكي من مرحلتين: الإشارات الفنية + تحليل Claude AI المتقدم</p>
        </div>

        <div class="search-box">
            <div class="search-input-group">
                <input 
                    type="text" 
                    class="search-input" 
                    id="stock-search" 
                    placeholder="أدخل رمز السهم (مثال: AAPL, MSFT, TSLA)"
                    onkeypress="if(event.key === 'Enter') searchStock()"
                >
                <button class="search-btn" onclick="searchStock()" id="search-btn">
                    🔍 بحث وتحليل
                </button>
            </div>
        </div>

        <div class="tabs">
            <button class="tab active" onclick="switchTab('analysis')">📊 أفضل الفرص</button>
        </div>

        <div id="analysis-tab" class="tab-content active">
            <div id="stocks-container" class="loading">⏳ جاري تحميل البيانات...</div>
        </div>
    </div>

    <div id="detail-modal" class="modal">
        <div class="modal-content">
            <button class="close-modal" onclick="closeModal()">✖</button>
            <div id="detail-content"></div>
        </div>
    </div>

    <script>
        const API_URL = 'https://optimax-backend.vercel.app';
        let currentTab = 'analysis';

        function switchTab(tab) {
            currentTab = tab;
            document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
            document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
            
            event.target.classList.add('active');
            document.getElementById(`${tab}-tab`).classList.add('active');
        }

        async function searchStock() {
            const input = document.getElementById('stock-search');
            const btn = document.getElementById('search-btn');
            const symbol = input.value.trim().toUpperCase();
            
            if (!symbol) {
                alert('الرجاء إدخال رمز السهم');
                return;
            }

            btn.disabled = true;
            btn.textContent = '⏳ جاري البحث والتحليل...';

            try {
                await showDetails(symbol);
                input.value = '';
            } catch (error) {
                alert('فشل تحليل السهم. تأكد من رمز السهم.');
            } finally {
                btn.disabled = false;
                btn.textContent = '🔍 بحث وتحليل';
            }
        }

        async function loadStocks() {
            const container = document.getElementById('stocks-container');
            
            try {
                const response = await fetch(`${API_URL}/top-opportunities?limit=10`);
                const data = await response.json();
                
                if (!data.top_opportunities || data.top_opportunities.length === 0) {
                    container.innerHTML = '<div class="no-data">لا توجد فرص متاحة حالياً</div>';
                    return;
                }

                let html = '<div class="stock-grid">';
                
                data.top_opportunities.forEach(stock => {
                    const changeClass = stock.change_pct >= 0 ? 'positive' : 'negative';
                    const changeSign = stock.change_pct >= 0 ? '+' : '';
                    
                    html += `
                        <div class="stock-card" onclick="showDetails('${stock.symbol}')">
                            <div class="stock-header">
                                <div class="stock-symbol">${stock.symbol}</div>
                                <div class="stock-price">$${stock.price}</div>
                            </div>
                            <div class="stock-change ${changeClass}">
                                ${changeSign}${stock.change_pct.toFixed(2)}%
                            </div>
                            <div class="score-badge">${stock.score}/14.5</div>
                            <div class="signal-badge signal-${stock.signal.replace(/ /g, '-')}">${stock.signal}</div>
                            <div style="margin-top: 10px; color: #666;">
                                RSI: ${stock.rsi} | MACD: ${stock.macd}
                            </div>
                        </div>
                    `;
                });
                
                html += '</div>';
                container.innerHTML = html;
                
            } catch (error) {
                console.error('Error loading stocks:', error);
                container.innerHTML = '<div class="error">❌ فشل تحميل البيانات. يرجى المحاولة مرة أخرى.</div>';
            }
        }

        async function showDetails(symbol) {
            const modal = document.getElementById('detail-modal');
            const content = document.getElementById('detail-content');
            
            modal.classList.add('active');
            content.innerHTML = '<div class="loading" style="color: #333;">⏳ جاري التحليل الشامل...</div>';
            
            try {
                const response = await fetch(`${API_URL}/analysis/${symbol}`);
                const data = await response.json();
                
                let html = `
                    <h2 style="color: #667eea; margin-bottom: 10px;">${data.symbol} - ${data.name}</h2>
                    <p style="font-size: 1.2em; margin-bottom: 30px;">
                        السعر: <strong>$${data.price}</strong> | 
                        التغير: <strong class="${data.change_pct >= 0 ? 'positive' : 'negative'}">${data.change_pct >= 0 ? '+' : ''}${data.change_pct.toFixed(2)}%</strong>
                    </p>

                    <!-- ═══════════════════════════════════════════════════════ -->
                    <!-- المرحلة 1️⃣: تقييم الإشارات الفنية -->
                    <!-- ═══════════════════════════════════════════════════════ -->

                    <div class="detail-section stage-1">
                        <div class="stage-badge stage-1-badge">📊 المرحلة 1: تقييم الإشارات الفنية</div>
                        <h3>تحليل بسيط ومباشر لكل مؤشر فني</h3>
                        
                        <table class="signals-table">
                            <thead>
                                <tr>
                                    <th>المؤشر</th>
                                    <th>القيمة</th>
                                    <th>الحالة</th>
                                    <th>النقاط</th>
                                    <th>التفسير</th>
                                </tr>
                            </thead>
                            <tbody>
                                ${data.technical_signals.signals.map(signal => `
                                    <tr>
                                        <td style="font-weight: bold;">${signal.name}</td>
                                        <td>${typeof signal.value === 'number' ? signal.value.toFixed(2) : signal.value}</td>
                                        <td>${signal.status}</td>
                                        <td><strong>${signal.score.toFixed(1)}/${signal.max.toFixed(1)}</strong></td>
                                        <td style="color: #666;">${signal.interpretation}</td>
                                    </tr>
                                `).join('')}
                            </tbody>
                        </table>

                        <div class="summary-box">
                            <div style="font-size: 1.5em; font-weight: bold; color: #667eea; margin-bottom: 15px;">
                                📈 النتيجة الفنية الإجمالية: ${data.technical_signals.total_score}/${data.technical_signals.total_max} 
                                (${data.technical_signals.percentage}%)
                            </div>
                            <div style="font-size: 1.3em; margin-bottom: 15px;">
                                🎯 التقييم العام: <strong>${data.technical_signals.overall_assessment}</strong>
                            </div>
                            <div style="font-size: 1.1em; color: #666;">
                                ✅ ${data.technical_signals.positive_count} إشارات إيجابية &nbsp;|&nbsp;
                                ⚪ ${data.technical_signals.neutral_count} إشارات محايدة &nbsp;|&nbsp;
                                ❌ ${data.technical_signals.negative_count} إشارة سلبية
                            </div>
                        </div>
                    </div>

                    <!-- ═══════════════════════════════════════════════════════ -->
                    <!-- المرحلة 2️⃣: تحليل Claude AI المتقدم -->
                    <!-- ═══════════════════════════════════════════════════════ -->

                    <div class="detail-section stage-2">
                        <div class="stage-badge stage-2-badge">🤖 المرحلة 2: تحليل Claude AI المتقدم</div>
                        <h3>تحليل عميق وشامل لكل عنصر</h3>
                        
                        ${data.claude_deep_analysis.error ? `
                            <div class="error">
                                ❌ حدث خطأ في تحليل Claude AI: ${data.claude_deep_analysis.error}
                            </div>
                        ` : ''}

                        <!-- 1. تحليل المؤشرات التفصيلي -->
                        ${data.claude_deep_analysis.detailed_indicators && data.claude_deep_analysis.detailed_indicators.length > 0 ? `
                            <div style="margin: 25px 0;">
                                <h4 style="color: #10b981; font-size: 1.3em; margin-bottom: 15px;">📊 تحليل تفصيلي لكل مؤشر:</h4>
                                ${data.claude_deep_analysis.detailed_indicators.map((ind, i) => `
                                    <div class="claude-indicator-box">
                                        <h4>${i+1}️⃣ ${ind.name}</h4>
                                        <p><strong>الحالة:</strong> ${ind.status}</p>
                                        <p><strong>التفسير:</strong> ${ind.interpretation}</p>
                                        <p><strong>الوزن:</strong> ${ind.weight}</p>
                                        <p><strong>التأثير:</strong> ${ind.impact}</p>
                                    </div>
                                `).join('')}
                            </div>
                        ` : ''}

                        <!-- 2. مستويات الدعم والمقاومة -->
                        ${data.claude_deep_analysis.support_resistance_analysis ? `
                            <div style="margin: 25px 0;">
                                <h4 style="color: #10b981; font-size: 1.3em; margin-bottom: 15px;">🎯 مستويات الدعم والمقاومة:</h4>
                                <div class="info-box">
                                    ${typeof data.claude_deep_analysis.support_resistance_analysis === 'string' 
                                        ? data.claude_deep_analysis.support_resistance_analysis 
                                        : data.claude_deep_analysis.support_resistance_analysis.analysis || JSON.stringify(data.claude_deep_analysis.support_resistance_analysis)}
                                </div>
                            </div>
                        ` : ''}

                        <!-- 3. تحليل الزخم -->
                        ${data.claude_deep_analysis.momentum_analysis ? `
                            <div style="margin: 25px 0;">
                                <h4 style="color: #10b981; font-size: 1.3em; margin-bottom: 15px;">⚡ تحليل الزخم:</h4>
                                <div class="info-box">
                                    ${typeof data.claude_deep_analysis.momentum_analysis === 'string'
                                        ? data.claude_deep_analysis.momentum_analysis
                                        : data.claude_deep_analysis.momentum_analysis.analysis || JSON.stringify(data.claude_deep_analysis.momentum_analysis)}
                                </div>
                            </div>
                        ` : ''}

                        <!-- 4. تحليل المخاطرة/العائد -->
                        ${data.claude_deep_analysis.risk_reward_analysis ? `
                            <div style="margin: 25px 0;">
                                <h4 style="color: #10b981; font-size: 1.3em; margin-bottom: 15px;">💰 تحليل المخاطرة/العائد:</h4>
                                <div class="warning-box">
                                    ${typeof data.claude_deep_analysis.risk_reward_analysis === 'string'
                                        ? data.claude_deep_analysis.risk_reward_analysis
                                        : data.claude_deep_analysis.risk_reward_analysis.analysis || JSON.stringify(data.claude_deep_analysis.risk_reward_analysis)}
                                </div>
                            </div>
                        ` : ''}

                        <!-- 5. تقييم جودة الفرصة -->
                        ${data.claude_deep_analysis.opportunity_quality_analysis ? `
                            <div style="margin: 25px 0;">
                                <h4 style="color: #10b981; font-size: 1.3em; margin-bottom: 15px;">🏆 تقييم جودة الفرصة:</h4>
                                <div class="info-box">
                                    ${typeof data.claude_deep_analysis.opportunity_quality_analysis === 'string'
                                        ? data.claude_deep_analysis.opportunity_quality_analysis
                                        : data.claude_deep_analysis.opportunity_quality_analysis.analysis || JSON.stringify(data.claude_deep_analysis.opportunity_quality_analysis)}
                                </div>
                            </div>
                        ` : ''}

                        <!-- 6. حجم التداول والسيولة -->
                        ${data.claude_deep_analysis.volume_and_liquidity ? `
                            <div style="margin: 25px 0;">
                                <h4 style="color: #10b981; font-size: 1.3em; margin-bottom: 15px;">📊 حجم التداول والسيولة:</h4>
                                <div class="info-box">
                                    ${typeof data.claude_deep_analysis.volume_and_liquidity === 'string'
                                        ? data.claude_deep_analysis.volume_and_liquidity
                                        : data.claude_deep_analysis.volume_and_liquidity.analysis || JSON.stringify(data.claude_deep_analysis.volume_and_liquidity)}
                                </div>
                            </div>
                        ` : ''}

                        <!-- 7. التوصية النهائية من Claude -->
                        ${data.claude_deep_analysis.final_recommendation ? `
                            <div class="final-decision-box ${
                                data.claude_deep_analysis.final_recommendation.decision.includes('ادخل') ? '' :
                                data.claude_deep_analysis.final_recommendation.decision.includes('لا تدخل') ? 'negative' : 'neutral'
                            }">
                                <h4>🎯 التوصية النهائية من Claude AI</h4>
                                <div style="font-size: 1.4em; font-weight: bold; margin: 15px 0;">
                                    📋 القرار: ${data.claude_deep_analysis.final_recommendation.decision}
                                </div>
                                <div style="margin: 20px 0; line-height: 1.9; font-size: 1.05em;">
                                    <strong>📝 التحليل الشامل:</strong><br>
                                    ${data.claude_deep_analysis.final_recommendation.comprehensive_analysis}
                                </div>
                                ${data.claude_deep_analysis.final_recommendation.reasons && data.claude_deep_analysis.final_recommendation.reasons.length > 0 ? `
                                    <div style="margin: 20px 0;">
                                        <strong>⚠️ الأسباب الرئيسية:</strong>
                                        <ul style="margin: 10px 0; padding-right: 25px;">
                                            ${data.claude_deep_analysis.final_recommendation.reasons.map(r => `<li style="margin: 8px 0;">${r}</li>`).join('')}
                                        </ul>
                                    </div>
                                ` : ''}
                                ${data.claude_deep_analysis.final_recommendation.conditions ? `
                                    <div style="margin: 20px 0;">
                                        <strong>✅ شروط الدخول:</strong><br>
                                        ${data.claude_deep_analysis.final_recommendation.conditions}
                                    </div>
                                ` : ''}
                                ${data.claude_deep_analysis.final_recommendation.alternatives ? `
                                    <div style="margin: 20px 0;">
                                        <strong>💡 البدائل المقترحة:</strong><br>
                                        ${data.claude_deep_analysis.final_recommendation.alternatives}
                                    </div>
                                ` : ''}
                                <div style="margin-top: 20px; padding-top: 20px; border-top: 2px solid rgba(255,255,255,0.3); font-size: 1.05em;">
                                    <strong>درجة الثقة:</strong> ${data.claude_deep_analysis.final_recommendation.confidence}/100 &nbsp;|&nbsp;
                                    <strong>احتمالية النجاح:</strong> ${data.claude_deep_analysis.final_recommendation.success_probability}%
                                </div>
                            </div>
                        ` : ''}
                    </div>

                    <!-- ═══════════════════════════════════════════════════════ -->
                    <!-- بيانات إضافية -->
                    <!-- ═══════════════════════════════════════════════════════ -->

                    <div class="detail-section">
                        <h3>📊 المؤشرات الفنية الكاملة</h3>
                        <div class="detail-grid">
                            <div class="detail-item"><strong>RSI</strong>${data.indicators.rsi}</div>
                            <div class="detail-item"><strong>MACD</strong>${data.indicators.macd}</div>
                            <div class="detail-item"><strong>ADX</strong>${data.indicators.adx}</div>
                            <div class="detail-item"><strong>MFI</strong>${data.indicators.mfi}</div>
                            <div class="detail-item"><strong>ATR</strong>${data.indicators.atr}</div>
                            <div class="detail-item"><strong>ROC</strong>${data.indicators.roc}%</div>
                            <div class="detail-item"><strong>SMA-20</strong>$${data.indicators.sma_20}</div>
                            <div class="detail-item"><strong>SMA-50</strong>$${data.indicators.sma_50}</div>
                        </div>
                    </div>

                    <div class="detail-section">
                        <h3>🎯 الأهداف والدعم/المقاومة</h3>
                        <div class="detail-grid">
                            <div class="detail-item"><strong>نقطة الدخول</strong>$${data.targets.entry}</div>
                            <div class="detail-item"><strong>الهدف القصير</strong>$${data.targets.target_short}</div>
                            <div class="detail-item"><strong>الهدف المتوسط</strong>$${data.targets.target_medium}</div>
                            <div class="detail-item"><strong>وقف الخسارة</strong>$${data.targets.stop_loss}</div>
                            ${data.support_resistance.resistance_1 ? `<div class="detail-item"><strong>مقاومة 1</strong>$${data.support_resistance.resistance_1}</div>` : ''}
                            ${data.support_resistance.support_1 ? `<div class="detail-item"><strong>دعم 1</strong>$${data.support_resistance.support_1}</div>` : ''}
                        </div>
                    </div>

                    ${data.fundamentals ? `
                        <div class="detail-section">
                            <h3>💼 البيانات الأساسية</h3>
                            <div class="detail-grid">
                                ${data.fundamentals.pe_ratio ? `<div class="detail-item"><strong>P/E Ratio</strong>${data.fundamentals.pe_ratio}</div>` : ''}
                                ${data.fundamentals.eps ? `<div class="detail-item"><strong>EPS</strong>$${data.fundamentals.eps}</div>` : ''}
                                ${data.fundamentals.market_cap ? `<div class="detail-item"><strong>Market Cap</strong>${(data.fundamentals.market_cap / 1e9).toFixed(1)}B</div>` : ''}
                                <div class="detail-item"><strong>القطاع</strong>${data.fundamentals.sector}</div>
                            </div>
                        </div>
                    ` : ''}
                `;
                
                content.innerHTML = html;
                
            } catch (error) {
                console.error('Error loading details:', error);
                content.innerHTML = '<div class="error">❌ فشل تحميل التفاصيل. يرجى المحاولة مرة أخرى.</div>';
            }
        }

        function closeModal() {
            document.getElementById('detail-modal').classList.remove('active');
        }

        document.getElementById('detail-modal').addEventListener('click', (e) => {
            if (e.target.id === 'detail-modal') {
                closeModal();
            }
        });

        document.addEventListener('DOMContentLoaded', () => {
            loadStocks();
        });
    </script>
</body>
</html>
