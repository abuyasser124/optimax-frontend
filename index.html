<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OptiMax - تحليل الأسهم الشرعية</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
        }

        .header {
            background: white;
            padding: 30px;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
            margin-bottom: 30px;
            text-align: center;
        }

        .header h1 {
            color: #667eea;
            font-size: 2.5em;
            margin-bottom: 10px;
        }

        .header p {
            color: #666;
            font-size: 1.1em;
        }

        .search-box {
            background: white;
            padding: 20px;
            border-radius: 15px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
            margin-bottom: 20px;
        }

        .search-input-group {
            display: flex;
            gap: 10px;
        }

        .search-input {
            flex: 1;
            padding: 15px;
            border: 2px solid #e5e7eb;
            border-radius: 10px;
            font-size: 1.1em;
            text-align: right;
        }

        .search-input:focus {
            outline: none;
            border-color: #667eea;
        }

        .search-btn {
            padding: 15px 30px;
            background: #667eea;
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 1.1em;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s;
        }

        .search-btn:hover {
            background: #5568d3;
        }

        .search-btn:disabled {
            background: #9ca3af;
            cursor: not-allowed;
        }

        .tabs {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
        }

        .tab {
            flex: 1;
            padding: 15px;
            background: white;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            font-size: 1.1em;
            font-weight: bold;
            transition: all 0.3s;
        }

        .tab.active {
            background: #667eea;
            color: white;
        }

        .tab-content {
            display: none;
        }

        .tab-content.active {
            display: block;
        }

        .stock-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 20px;
            margin-top: 20px;
        }

        .stock-card {
            background: white;
            padding: 20px;
            border-radius: 15px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
            cursor: pointer;
            transition: transform 0.3s, box-shadow 0.3s;
            position: relative;
        }

        .stock-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 10px 25px rgba(0,0,0,0.2);
        }

        .stock-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
        }

        .stock-symbol {
            font-size: 1.5em;
            font-weight: bold;
            color: #667eea;
        }

        .stock-price {
            font-size: 1.3em;
            font-weight: bold;
            color: #333;
        }

        .stock-change {
            margin: 10px 0;
            font-size: 1.1em;
        }

        .positive {
            color: #10b981;
        }

        .negative {
            color: #ef4444;
        }

        .score-badge {
            display: inline-block;
            padding: 8px 15px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border-radius: 20px;
            font-weight: bold;
            margin: 10px 0;
        }

        .signal-badge {
            display: inline-block;
            padding: 5px 10px;
            border-radius: 5px;
            font-size: 0.9em;
            font-weight: bold;
        }

        .signal-super-strong-buy {
            background: #10b981;
            color: white;
        }

        .signal-strong-buy {
            background: #34d399;
            color: white;
        }

        .signal-buy {
            background: #6ee7b7;
            color: #065f46;
        }

        .signal-hold {
            background: #fbbf24;
            color: #78350f;
        }

        .signal-sell {
            background: #ef4444;
            color: white;
        }

        .loading {
            text-align: center;
            padding: 50px;
            font-size: 1.5em;
            color: white;
        }

        .error {
            background: #fee2e2;
            color: #991b1b;
            padding: 20px;
            border-radius: 10px;
            margin: 20px 0;
        }

        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.7);
            z-index: 1000;
            overflow-y: auto;
        }

        .modal.active {
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .modal-content {
            background: white;
            padding: 30px;
            border-radius: 20px;
            max-width: 800px;
            width: 100%;
            max-height: 90vh;
            overflow-y: auto;
            position: relative;
        }

        .close-modal {
            position: absolute;
            top: 20px;
            left: 20px;
            font-size: 2em;
            cursor: pointer;
            background: none;
            border: none;
            color: #666;
        }

        .detail-section {
            margin: 20px 0;
            padding: 20px;
            background: #f9fafb;
            border-radius: 10px;
        }

        .detail-section h3 {
            color: #667eea;
            margin-bottom: 15px;
        }

        .detail-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 15px;
        }

        .detail-item {
            padding: 10px;
            background: white;
            border-radius: 8px;
        }

        .detail-item strong {
            color: #666;
            display: block;
            margin-bottom: 5px;
        }

        .warning-box {
            background: #fef3c7;
            border-left: 4px solid #f59e0b;
            padding: 15px;
            margin: 15px 0;
            border-radius: 5px;
        }

        .info-box {
            background: #dbeafe;
            border-left: 4px solid #3b82f6;
            padding: 15px;
            margin: 15px 0;
            border-radius: 5px;
        }

        .success-box {
            background: #d1fae5;
            border-left: 4px solid #10b981;
            padding: 15px;
            margin: 15px 0;
            border-radius: 5px;
        }

        .no-data {
            text-align: center;
            padding: 50px;
            color: #666;
            font-size: 1.2em;
        }

        @media (max-width: 768px) {
            .header h1 {
                font-size: 1.8em;
            }

            .stock-grid {
                grid-template-columns: 1fr;
            }

            .modal-content {
                padding: 20px;
            }

            .detail-grid {
                grid-template-columns: 1fr;
            }

            .search-input-group {
                flex-direction: column;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>📈 OptiMax v7.2.0</h1>
            <p>تحليل ذكي للأسهم الشرعية - Ultra Edition</p>
        </div>

        <div class="search-box">
            <div class="search-input-group">
                <input 
                    type="text" 
                    class="search-input" 
                    id="stock-search" 
                    placeholder="أدخل رمز السهم (مثال: AAPL, MSFT, TSLA)"
                    onkeypress="if(event.key === 'Enter') searchStock()"
                >
                <button class="search-btn" onclick="searchStock()" id="search-btn">
                    🔍 بحث
                </button>
            </div>
        </div>

        <div class="tabs">
            <button class="tab active" onclick="switchTab('analysis')">📊 أفضل الفرص</button>
        </div>

        <div id="analysis-tab" class="tab-content active">
            <div id="stocks-container" class="loading">⏳ جاري تحميل البيانات...</div>
        </div>
    </div>

    <div id="detail-modal" class="modal">
        <div class="modal-content">
            <button class="close-modal" onclick="closeModal()">✖</button>
            <div id="detail-content"></div>
        </div>
    </div>

    <script>
        const API_URL = 'https://optimax-backend.vercel.app';
        let currentTab = 'analysis';

        function switchTab(tab) {
            currentTab = tab;
            document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
            document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
            
            event.target.classList.add('active');
            document.getElementById(`${tab}-tab`).classList.add('active');
        }

        async function searchStock() {
            const input = document.getElementById('stock-search');
            const btn = document.getElementById('search-btn');
            const symbol = input.value.trim().toUpperCase();
            
            if (!symbol) {
                alert('الرجاء إدخال رمز السهم');
                return;
            }

            btn.disabled = true;
            btn.textContent = '⏳ جاري البحث...';

            try {
                await showDetails(symbol);
                input.value = '';
            } catch (error) {
                alert('فشل تحليل السهم. تأكد من رمز السهم.');
            } finally {
                btn.disabled = false;
                btn.textContent = '🔍 بحث';
            }
        }

        async function loadStocks() {
            const container = document.getElementById('stocks-container');
            
            try {
                const response = await fetch(`${API_URL}/top-opportunities?limit=10`);
                const data = await response.json();
                
                if (!data.top_opportunities || data.top_opportunities.length === 0) {
                    container.innerHTML = '<div class="no-data">لا توجد فرص متاحة حالياً</div>';
                    return;
                }

                let html = '<div class="stock-grid">';
                
                data.top_opportunities.forEach(stock => {
                    const changeClass = stock.change_pct >= 0 ? 'positive' : 'negative';
                    const changeSign = stock.change_pct >= 0 ? '+' : '';
                    
                    html += `
                        <div class="stock-card" onclick="showDetails('${stock.symbol}')">
                            <div class="stock-header">
                                <div class="stock-symbol">${stock.symbol}</div>
                                <div class="stock-price">$${stock.price}</div>
                            </div>
                            <div class="stock-change ${changeClass}">
                                ${changeSign}${stock.change_pct.toFixed(2)}%
                            </div>
                            <div class="score-badge">${stock.score}/13</div>
                            <div class="signal-badge signal-${stock.signal.toLowerCase().replace(/ /g, '-')}">${stock.signal}</div>
                            <div style="margin-top: 10px; color: #666;">
                                RSI: ${stock.rsi} | MACD: ${stock.macd}
                            </div>
                        </div>
                    `;
                });
                
                html += '</div>';
                container.innerHTML = html;
                
            } catch (error) {
                console.error('Error loading stocks:', error);
                container.innerHTML = '<div class="error">❌ فشل تحميل البيانات. يرجى المحاولة مرة أخرى.</div>';
            }
        }

        async function showDetails(symbol) {
            const modal = document.getElementById('detail-modal');
            const content = document.getElementById('detail-content');
            
            modal.classList.add('active');
            content.innerHTML = '<div class="loading">⏳ جاري التحميل...</div>';
            
            try {
                const response = await fetch(`${API_URL}/analysis/${symbol}`);
                const data = await response.json();
                
                let html = `
                    <h2>${data.symbol} - ${data.name}</h2>
                    <p>السعر: $${data.price} | التغير: ${data.change_pct >= 0 ? '+' : ''}${data.change_pct.toFixed(2)}%</p>

                    <div class="detail-section">
                        <h3>📈 ملخص التقييم</h3>
                        <div class="score-badge" style="font-size: 1.5em;">${data.score}/13</div>
                        <div class="signal-badge signal-${data.signal.toLowerCase().replace(/ /g, '-')}" style="font-size: 1.2em; margin: 10px 0;">
                            ${data.signal}
                        </div>
                        ${data.opportunity_quality ? `
                            <div style="margin: 10px 0;">
                                <strong>Grade: ${data.opportunity_quality.grade}</strong>
                                <p>${data.opportunity_quality.recommendation}</p>
                            </div>
                        ` : ''}
                    </div>

                    <div class="detail-section">
                        <h3>🔍 إشارات التأكيد</h3>
                        <div class="detail-grid">
                            ${Object.entries(data.confirmation.signals).map(([key, value]) => `
                                <div class="detail-item">
                                    <strong>${key.toUpperCase()}</strong>
                                    ${value}
                                </div>
                            `).join('')}
                        </div>
                        <p style="margin-top: 15px; font-size: 1.1em;">
                            <strong>${data.confirmation.positive_count}/${data.confirmation.total}</strong>
                            <br>${data.confirmation.verdict}
                        </p>
                    </div>

                    ${data.final_recommendation ? `
                        <div class="${data.final_recommendation.confidence === 'عالية' ? 'success-box' : data.final_recommendation.confidence === 'منخفضة' ? 'warning-box' : 'info-box'}">
                            <strong>📋 التوصية النهائية: ${data.final_recommendation.action}</strong>
                            <p>${data.final_recommendation.reason}</p>
                            <small>مستوى الثقة: ${data.final_recommendation.confidence}</small>
                        </div>
                    ` : ''}

                    ${data.daily_change_context ? `
                        <div class="${data.daily_change_context.type === 'تصحيح صحي' || data.daily_change_context.type === 'زخم قوي' ? 'success-box' : data.daily_change_context.type === 'تحذير' ? 'warning-box' : 'info-box'}">
                            ${data.daily_change_context.message}
                        </div>
                    ` : ''}

                    <div class="detail-section">
                        <h3>🎯 الأهداف المتوقعة</h3>
                        <p><strong>➡️ الاتجاه: ${data.targets.direction}</strong></p>
                        <div class="detail-grid">
                            <div class="detail-item">
                                <strong>نقطة الدخول</strong>
                                $${data.targets.entry}
                            </div>
                            <div class="detail-item">
                                <strong>الهدف القصير</strong>
                                $${data.targets.target_short} ⬆️
                            </div>
                            <div class="detail-item">
                                <strong>الهدف المتوسط</strong>
                                $${data.targets.target_medium} ⬆️
                            </div>
                            <div class="detail-item">
                                <strong>وقف الخسارة</strong>
                                $${data.targets.stop_loss} ⬇️
                            </div>
                        </div>
                        ${data.risk_reward ? `
                            <div style="margin-top: 15px; padding: 15px; background: white; border-radius: 8px;">
                                <strong>نسبة المخاطرة/العائد: ${data.risk_reward.ratio}</strong>
                                <p>عائد محتمل: ${data.risk_reward.potential_gain}% | خسارة محتملة: ${data.risk_reward.potential_loss}%</p>
                                <p>التقييم: ${data.risk_reward.verdict}</p>
                            </div>
                        ` : ''}
                    </div>

                    ${data.position_risk && (data.position_risk.warnings.length > 0 || data.position_risk.opportunities.length > 0) ? `
                        <div class="detail-section">
                            <h3>⚠️ تحليل المكان</h3>
                            ${data.position_risk.warnings.length > 0 ? `
                                <div class="warning-box">
                                    ${data.position_risk.warnings.map(w => `<p>${w}</p>`).join('')}
                                </div>
                            ` : ''}
                            ${data.position_risk.opportunities.length > 0 ? `
                                <div class="success-box">
                                    ${data.position_risk.opportunities.map(o => `<p>${o}</p>`).join('')}
                                </div>
                            ` : ''}
                        </div>
                    ` : ''}

                    ${data.late_entry_warning && data.late_entry_warning.warnings.length > 0 ? `
                        <div class="warning-box">
                            <strong>⚠️ تحذيرات الدخول المتأخر:</strong>
                            ${data.late_entry_warning.warnings.map(w => `<p>${w}</p>`).join('')}
                        </div>
                    ` : ''}

                    <div class="detail-section">
                        <h3>📊 مستويات الدعم والمقاومة</h3>
                        <div class="detail-grid">
                            ${data.support_resistance.resistance_1 ? `
                                <div class="detail-item">
                                    <strong>مقاومة 1</strong>
                                    $${data.support_resistance.resistance_1}
                                </div>
                            ` : ''}
                            ${data.support_resistance.resistance_2 ? `
                                <div class="detail-item">
                                    <strong>مقاومة 2</strong>
                                    $${data.support_resistance.resistance_2}
                                </div>
                            ` : ''}
                            ${data.support_resistance.support_1 ? `
                                <div class="detail-item">
                                    <strong>دعم 1</strong>
                                    $${data.support_resistance.support_1}
                                </div>
                            ` : ''}
                            ${data.support_resistance.support_2 ? `
                                <div class="detail-item">
                                    <strong>دعم 2</strong>
                                    $${data.support_resistance.support_2}
                                </div>
                            ` : ''}
                        </div>
                    </div>

                    ${data.momentum_analysis ? `
                        <div class="detail-section">
                            <h3>⚡ تحليل الزخم</h3>
                            <p><strong>النقاط: ${data.momentum_analysis.score}/10</strong></p>
                            <p>القوة: ${data.momentum_analysis.strength}</p>
                        </div>
                    ` : ''}

                    ${data.recent_performance ? `
                        <div class="detail-section">
                            <h3>📈 الأداء الأخير (5 أيام)</h3>
                            <div class="detail-grid">
                                <div class="detail-item">
                                    <strong>الاتجاه</strong>
                                    ${data.recent_performance.trend}
                                </div>
                                <div class="detail-item">
                                    <strong>أيام إيجابية</strong>
                                    ${data.recent_performance.positive_days}/5
                                </div>
                                <div class="detail-item">
                                    <strong>متوسط التغير</strong>
                                    ${data.recent_performance.avg_daily_change}%
                                </div>
                                <div class="detail-item">
                                    <strong>الاستمرارية</strong>
                                    ${data.recent_performance.consistency}
                                </div>
                            </div>
                        </div>
                    ` : ''}

                    ${data.claude_analysis ? `
                        <div class="detail-section">
                            <h3>🎯 رأي Claude AI</h3>
                            <p><strong>درجة الثقة: ${data.claude_analysis.confidence}/100</strong></p>
                            <p><strong>تقييم النجاح: ${data.claude_analysis.success_rating}/10</strong></p>
                            <p><strong>احتمالية الربح: ${data.claude_analysis.profit_probability}%</strong></p>
                            <p style="margin-top: 15px;"><strong>📝 الملخص:</strong><br>${data.claude_analysis.summary}</p>
                            <p style="margin-top: 15px;"><strong>💡 التوصية النهائية:</strong><br>${data.claude_analysis.recommendation}</p>
                            
                            ${data.claude_analysis.risks && data.claude_analysis.risks.length > 0 ? `
                                <div style="margin-top: 15px;">
                                    <strong>⚠️ المخاطر</strong>
                                    <ul>
                                        ${data.claude_analysis.risks.map(risk => `<li>${risk}</li>`).join('')}
                                    </ul>
                                </div>
                            ` : ''}

                            ${data.claude_analysis.opportunities && data.claude_analysis.opportunities.length > 0 ? `
                                <div style="margin-top: 15px;">
                                    <strong>✅ الفرص</strong>
                                    <ul>
                                        ${data.claude_analysis.opportunities.map(opp => `<li>${opp}</li>`).join('')}
                                    </ul>
                                </div>
                            ` : ''}

                            ${data.claude_analysis.alerts && data.claude_analysis.alerts.length > 0 ? `
                                <div style="margin-top: 15px;">
                                    <strong>⚡ التنبيهات الذكية</strong>
                                    <ul>
                                        ${data.claude_analysis.alerts.map(alert => `<li>${alert}</li>`).join('')}
                                    </ul>
                                </div>
                            ` : ''}
                        </div>
                    ` : ''}

                    <div class="detail-section">
                        <h3>📊 المؤشرات الفنية الكاملة</h3>
                        <div class="detail-grid">
                            <div class="detail-item"><strong>RSI</strong>${data.indicators.rsi}</div>
                            <div class="detail-item"><strong>MACD</strong>${data.indicators.macd}</div>
                            <div class="detail-item"><strong>ADX</strong>${data.indicators.adx}</div>
                            <div class="detail-item"><strong>MFI</strong>${data.indicators.mfi}</div>
                            <div class="detail-item"><strong>ATR</strong>${data.indicators.atr}</div>
                            <div class="detail-item"><strong>ROC</strong>${data.indicators.roc}%</div>
                            <div class="detail-item"><strong>SMA-20</strong>$${data.indicators.sma_20}</div>
                            <div class="detail-item"><strong>SMA-50</strong>$${data.indicators.sma_50}</div>
                        </div>
                    </div>

                    ${data.fundamentals ? `
                        <div class="detail-section">
                            <h3>💼 البيانات الأساسية</h3>
                            <div class="detail-grid">
                                ${data.fundamentals.pe_ratio ? `<div class="detail-item"><strong>P/E Ratio</strong>${data.fundamentals.pe_ratio}</div>` : ''}
                                ${data.fundamentals.eps ? `<div class="detail-item"><strong>EPS</strong>$${data.fundamentals.eps}</div>` : ''}
                                ${data.fundamentals.market_cap ? `<div class="detail-item"><strong>Market Cap</strong>${(data.fundamentals.market_cap / 1e9).toFixed(1)}B</div>` : ''}
                                <div class="detail-item"><strong>القطاع</strong>${data.fundamentals.sector}</div>
                            </div>
                        </div>
                    ` : ''}

                    <div class="detail-section">
                        <h3>📊 تحليل حجم التداول</h3>
                        <div class="detail-grid">
                            <div class="detail-item"><strong>الحجم الحالي</strong>${data.volume_analysis.current.toLocaleString()}</div>
                            <div class="detail-item"><strong>المتوسط</strong>${data.volume_analysis.average.toLocaleString()}</div>
                            <div class="detail-item"><strong>الفرق</strong>${data.volume_analysis.difference_pct >= 0 ? '+' : ''}${data.volume_analysis.difference_pct.toFixed(2)}%</div>
                            <div class="detail-item"><strong>الاتجاه</strong>${data.volume_analysis.trend}</div>
                        </div>
                        ${data.volume_analysis.is_unusual ? '<p class="warning-box">⚠️ تحذير: حجم تداول غير طبيعي - راقب التلاعب المحتمل!</p>' : ''}
                    </div>
                `;
                
                content.innerHTML = html;
                
            } catch (error) {
                console.error('Error loading details:', error);
                content.innerHTML = '<div class="error">❌ فشل تحميل التفاصيل</div>';
            }
        }

        function closeModal() {
            document.getElementById('detail-modal').classList.remove('active');
        }

        document.getElementById('detail-modal').addEventListener('click', (e) => {
            if (e.target.id === 'detail-modal') {
                closeModal();
            }
        });

        document.addEventListener('DOMContentLoaded', () => {
            loadStocks();
        });
    </script>
</body>
</html>
